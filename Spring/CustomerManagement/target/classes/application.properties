spring.application.name=CustomerManagementApplication
server.port=8091

# Database Connection
spring.datasource.url=jdbc:mysql://localhost:3306/bank_loan_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update

# Show the SQL queries Hibernate writes in my console (Great for learning/debugging!)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true